databases:
  - name: opticapp-database
    databaseName: opticapp_database
    user: opticapp_database_user
    plan: free
    region: oregon

services:
  # Backend - Web Service
  - type: web
    name: opticapp-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && cd frontend && npm install && npm run build && cd ..
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: opticapp-database
          property: connectionString

